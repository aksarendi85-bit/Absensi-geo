<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABSENSI GEO</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  background:#0f2027;
  color:white;
  padding:20px;
}
video{
  width:100%;
  max-width:350px;
  border-radius:15px;
  background:black;
}
button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
}
</style>
</head>
<body>

<h2>ABSENSI GEO SECURE</h2>

<input type="text" id="nama" placeholder="Nama Anda"><br><br>

<select id="jenis">
  <option value="Masuk">Absen Masuk</option>
  <option value="Pulang">Absen Pulang</option>
</select><br><br>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas><br>

<button onclick="ambilFoto()">Ambil Foto</button>
<button onclick="kirim()">Kirim Absen</button>

<p id="status"></p>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZa_W47OnVIonuchDuqXmOVHaMr55JDiqJYNOhl8-8eblFZpgTEZaSCsZcGusAAdMf/exec";

let fotoBase64 = "";
let latitude = "";
let longitude = "";
let accuracy = "";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user"},
      audio:false
    });
    video.srcObject = stream;
    await video.play();
  }catch(err){
    statusText.innerText="❌ Kamera gagal: "+err.message;
  }
}

startCamera();

navigator.geolocation.getCurrentPosition(pos=>{
  latitude = pos.coords.latitude;
  longitude = pos.coords.longitude;
  accuracy = pos.coords.accuracy;
},{enableHighAccuracy:true});

function ambilFoto(){

  if(video.readyState !== 4){
    alert("Tunggu kamera siap...");
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  fotoBase64 = canvas.toDataURL("image/png");

  statusText.innerText="✅ Foto berhasil diambil";
}

async function kirim(){

  if(!fotoBase64){
    alert("Ambil foto dulu!");
    return;
  }

  statusText.innerText="Mengirim...";

  const ip = await fetch("https://api.ipify.org?format=json")
  .then(res=>res.json())
  .then(data=>data.ip);

  const payload = {
    nama: document.getElementById("nama").value,
    jenis: document.getElementById("jenis").value,
    lat: latitude,
    lng: longitude,
    accuracy: accuracy,
    foto: fotoBase64,
    ip: ip,
    device: navigator.userAgent
  };

  try{
    const response = await fetch(SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const result = await response.json();
    statusText.innerText=result.message;

  }catch(err){
    statusText.innerText="❌ Gagal kirim: "+err.message;
  }
}

</script>
</body>
</html>
