<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {font-family:Arial;text-align:center;background:#0f2027;color:white;padding:20px;}
video, canvas {width:100%;max-width:350px;border-radius:15px;}
button {padding:10px 20px;margin:10px;border:none;border-radius:10px;background:#00c6ff;color:white;}
input, select {padding:8px;border-radius:8px;border:none;margin:5px;}
</style>
</head>
<body>

<h2>ABSENSI GEO SECURE</h2>

<input type="text" id="nama" placeholder="Nama Anda"><br>

<select id="jenis">
  <option value="Masuk">Absen Masuk</option>
  <option value="Pulang">Absen Pulang</option>
</select><br>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none;"></canvas><br>

<button onclick="ambilFoto()">Ambil Foto</button>
<button onclick="kirim()">Kirim Absen</button>

<p id="status"></p>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZa_W47OnVIonuchDuqXmOVHaMr55JDiqJYNOhl8-8eblFZpgTEZaSCsZcGusAAdMf/exec";

let fotoBase64 = "";
let latitude = "";
let longitude = "";
let accuracy = 0;

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"user"},
    audio:false
  });
  const video = document.getElementById("video");
  video.srcObject = stream;
  await video.play();
}

window.onload = function(){
  startCamera();

  navigator.geolocation.getCurrentPosition(pos=>{
    latitude = pos.coords.latitude;
    longitude = pos.coords.longitude;
    accuracy = pos.coords.accuracy;
  }, null, {enableHighAccuracy:true});
};

function ambilFoto(){
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  fotoBase64 = canvas.toDataURL("image/png");
  document.getElementById("status").innerText="Foto berhasil diambil ✔";
}

async function kirim(){

  if(!fotoBase64){
    alert("Ambil foto dulu!");
    return;
  }

  document.getElementById("status").innerText="Mengirim...";

  const ip = await fetch("https://api.ipify.org?format=json")
    .then(res=>res.json())
    .then(data=>data.ip);

  const data = {
    nama: document.getElementById("nama").value,
    jenis: document.getElementById("jenis").value,
    lat: latitude,
    lng: longitude,
    accuracy: accuracy,
    foto: fotoBase64,
    ip: ip,
    device: navigator.userAgent
  };

  const response = await fetch(WEB_APP_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await response.json();
  document.getElementById("status").innerText=result.message;
}

</script>
</body>
</html>
