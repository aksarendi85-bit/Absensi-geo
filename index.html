<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSENSI GEO FIX</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  padding: 20px;
}
video, canvas {
  width: 100%;
  max-width: 350px;
  border-radius: 15px;
  margin-top: 10px;
}
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  font-weight: bold;
}
input, select {
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}
</style>
</head>
<body>

<h2>ABSENSI GEO SECURE</h2>

<input type="text" id="nama" placeholder="Nama Anda" required><br>

<select id="jenis">
  <option value="Masuk">Absen Masuk</option>
  <option value="Pulang">Absen Pulang</option>
</select><br>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none;"></canvas><br>

<button id="btnFoto" disabled>Ambil Foto</button>
<button onclick="kirim()">Kirim Absen</button>

<p id="status"></p>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZa_W47OnVIonuchDuqXmOVHaMr55JDiqJYNOhl8-8eblFZpgTEZaSCsZcGusAAdMf/exec";

let fotoBase64 = "";
let latitude = "";
let longitude = "";
let accuracy = 0;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const btnFoto = document.getElementById("btnFoto");
const statusText = document.getElementById("status");

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      btnFoto.disabled = false;
      statusText.innerText = "Kamera siap ✔";
    };

  }catch(err){
    statusText.innerText = "❌ Kamera gagal: " + err.message;
  }
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    latitude = pos.coords.latitude;
    longitude = pos.coords.longitude;
    accuracy = pos.coords.accuracy;
  }, err=>{
    statusText.innerText = "❌ GPS gagal";
  }, {enableHighAccuracy:true});
}

window.onload = function(){
  startCamera();
  getLocation();
};

btnFoto.onclick = function(){

  if(video.videoWidth === 0){
    statusText.innerText = "❌ Kamera belum siap";
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  fotoBase64 = canvas.toDataURL("image/png");

  if(fotoBase64.length < 1000){
    statusText.innerText = "❌ Foto gagal";
    return;
  }

  statusText.innerText = "Foto berhasil ✔";
};

async function kirim(){

  if(!fotoBase64){
    alert("Ambil foto dulu!");
    return;
  }

  statusText.innerText = "Mengirim...";

  try{

    const ip = await fetch("https://api.ipify.org?format=json")
      .then(res=>res.json())
      .then(data=>data.ip);

    const payload = {
      nama: document.getElementById("nama").value,
      jenis: document.getElementById("jenis").value,
      lat: latitude,
      lng: longitude,
      accuracy: accuracy,
      foto: fotoBase64,
      ip: ip,
      device: navigator.userAgent
    };

    const response = await fetch(WEB_APP_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });

    const result = await response.json();

    statusText.innerText = result.message;

  }catch(err){
    statusText.innerText = "❌ Gagal kirim: " + err.message;
  }
}

</script>
</body>
</html>
