<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSENSI GEO</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  padding: 20px;
}

video, canvas {
  width: 100%;
  max-width: 350px;
  border-radius: 15px;
  margin-top: 10px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  font-weight: bold;
}

input, select {
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}
</style>
</head>
<body>

<h2>ABSENSI GEO SECURE</h2>

<input type="text" id="nama" placeholder="Nama Anda" required><br>

<select id="jenis">
  <option value="Masuk">Absen Masuk</option>
  <option value="Pulang">Absen Pulang</option>
</select><br>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none;"></canvas><br>

<button onclick="ambilFoto()">Ambil Foto</button>
<button onclick="kirim()">Kirim Absen</button>

<p id="status"></p>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZa_W47OnVIonuchDuqXmOVHaMr55JDiqJYNOhl8-8eblFZpgTEZaSCsZcGusAAdMf/exec";

let fotoBase64 = "";
let latitude = "";
let longitude = "";
let accuracy = 0;

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

    document.getElementById("status").innerText = "Kamera aktif ✔";

  }catch(err){
    document.getElementById("status").innerText =
      "❌ Kamera gagal: " + err.message;
  }
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    latitude = pos.coords.latitude;
    longitude = pos.coords.longitude;
    accuracy = pos.coords.accuracy;
  }, err=>{
    document.getElementById("status").innerText =
      "❌ GPS gagal: " + err.message;
  }, {enableHighAccuracy:true});
}

window.onload = function(){
  startCamera();
  getLocation();
};

function ambilFoto(){

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  setTimeout(() => {

    const width = video.videoWidth || 640;
    const height = video.videoHeight || 480;

    canvas.width = width;
    canvas.height = height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, width, height);

    fotoBase64 = canvas.toDataURL("image/png");

    if(fotoBase64.length < 1000){
      document.getElementById("status").innerText =
        "❌ Foto gagal diambil";
      return;
    }

    document.getElementById("status").innerText =
      "Foto berhasil diambil ✔";

  }, 300);
}

async function kirim(){

  if(!fotoBase64){
    alert("Ambil foto dulu!");
    return;
  }

  document.getElementById("status").innerText="Mengirim...";

  try{

    const ip = await fetch("https://api.ipify.org?format=json")
      .then(res=>res.json())
      .then(data=>data.ip);

    const data = {
      nama: document.getElementById("nama").value,
      jenis: document.getElementById("jenis").value,
      lat: latitude,
      lng: longitude,
      accuracy: accuracy,
      foto: fotoBase64,
      ip: ip,
      device: navigator.userAgent
    };

    const response = await fetch(WEB_APP_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const text = await response.text();
    const result = JSON.parse(text);

    document.getElementById("status").innerText =
      result.message;

  }catch(err){
    document.getElementById("status").innerText =
      "❌ Gagal kirim: " + err.message;
  }
}

</script>

</body>
</html>
